<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VocabScroll · DE→ES</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --card-bg: #1a1a1a;
    --card-border: #2a2a2a;
    --text-primary: #f0f0f0;
    --text-secondary: #888;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --cyan: #4dd9e0;
    --orange: #fb923c;
    --radius: 20px;
    --swipe-hint-opacity: 0;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ── Top bar ── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    padding-top: max(10px, env(safe-area-inset-top));
    background: linear-gradient(to bottom, #0f0f0fdd 70%, transparent);
    gap: 8px;
  }

  #topbar .logo {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text-primary);
    flex-shrink: 0;
  }
  #topbar .logo span { color: var(--accent); }

  .mode-tabs {
    display: flex;
    gap: 4px;
    background: #222;
    border-radius: 10px;
    padding: 3px;
    flex: 1;
    min-width: 0;
  }
  .mode-tabs button {
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 11px;
    font-weight: 600;
    padding: 5px 7px;
    border-radius: 7px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
    flex: 1;
  }
  .mode-tabs button.active {
    background: var(--accent);
    color: #fff;
  }
  .mode-tabs button.active.verb-mode { background: var(--orange); }
  .mode-tabs button.active.conv-mode { background: var(--cyan); color: #000; }
  .mode-tabs button.active.challenge-mode { background: var(--yellow); color: #000; }

  #progress-wrap {
    font-size: 11px;
    color: var(--text-secondary);
    min-width: 36px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ── Card stack ── */
  #card-viewport {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .card {
    position: absolute;
    width: min(92vw, 420px);
    height: min(72vh, 540px);
    border-radius: var(--radius);
    cursor: grab;
    will-change: transform;
    transition: none;
  }
  .card:active { cursor: grabbing; }

  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(.4,0,.2,1);
    border-radius: var(--radius);
  }
  .card.flipped .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 24px;
    border: 1px solid var(--card-border);
    overflow: hidden;
  }

  .card-front { background: var(--card-bg); }
  .card-back {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    transform: rotateY(180deg);
  }
  .card-back.verb-back {
    background: linear-gradient(135deg, #1a1508 0%, #2d200a 100%);
  }
  .card-back.conv-back {
    background: linear-gradient(135deg, #0a1a1a 0%, #0d2a2e 100%);
  }

  /* Swipe overlays */
  .swipe-left-overlay, .swipe-right-overlay {
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    opacity: 0;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 2px;
    transition: opacity 0.1s;
    z-index: 10;
  }
  .swipe-left-overlay {
    background: linear-gradient(135deg, rgba(248,113,113,.3), rgba(248,113,113,.05));
    color: var(--red);
    border: 2px solid var(--red);
  }
  .swipe-right-overlay {
    background: linear-gradient(135deg, rgba(74,222,128,.05), rgba(74,222,128,.3));
    color: var(--green);
    border: 2px solid var(--green);
  }

  /* Card content */
  .card-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 10px;
    opacity: .7;
  }

  .card-word {
    font-size: clamp(28px, 9vw, 48px);
    font-weight: 800;
    letter-spacing: -1px;
    text-align: center;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .card-type {
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    background: rgba(108,99,255,.15);
    padding: 2px 10px;
    border-radius: 20px;
    margin-bottom: 16px;
  }
  .card-type.conv { color: var(--cyan); background: rgba(77,217,224,.15); }
  .card-type.verb { color: var(--orange); background: rgba(251,146,60,.15); }
  .card-type.challenge { color: var(--yellow); background: rgba(251,191,36,.15); }

  .card-hint {
    font-size: 12px;
    color: var(--text-secondary);
    text-align: center;
    position: absolute;
    bottom: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-hint .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text-secondary); opacity: .5; }

  /* Translation (back) */
  .card-translation {
    font-size: clamp(26px, 8vw, 44px);
    font-weight: 800;
    letter-spacing: -1px;
    text-align: center;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .card-translation.verb { color: var(--orange); }
  .card-translation.conv { color: var(--cyan); }
  .card-translation.challenge { color: var(--yellow); }

  /* Verb conjugation table */
  .verb-table {
    width: 100%;
    max-width: 340px;
    border-collapse: collapse;
    margin-bottom: 12px;
    font-size: 14px;
  }
  .verb-table td {
    padding: 5px 8px;
    border-bottom: 1px solid rgba(255,255,255,.07);
  }
  .verb-table td:first-child {
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 12px;
    width: 70px;
  }
  .verb-table td:last-child {
    color: var(--orange);
    font-weight: 700;
  }
  .verb-table tr:last-child td { border-bottom: none; }

  .tts-btn {
    margin-top: 12px;
    background: rgba(108,99,255,.2);
    border: 1px solid rgba(108,99,255,.4);
    color: var(--accent);
    border-radius: 50px;
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all .2s;
  }
  .tts-btn.verb { background: rgba(251,146,60,.2); border-color: rgba(251,146,60,.4); color: var(--orange); }
  .tts-btn.conv { background: rgba(77,217,224,.2); border-color: rgba(77,217,224,.4); color: var(--cyan); }
  .tts-btn.challenge { background: rgba(251,191,36,.2); border-color: rgba(251,191,36,.4); color: var(--yellow); }
  .tts-btn:active { transform: scale(.96); }

  /* Stacked cards behind */
  .card.behind-1 { transform: scale(0.95) translateY(12px); z-index: 1; pointer-events: none; }
  .card.behind-2 { transform: scale(0.90) translateY(24px); z-index: 0; pointer-events: none; }
  .card.active { z-index: 10; }

  /* ── Sub-screen (Verb tense selector / Challenge config) ── */
  #sub-screen {
    position: fixed;
    inset: 0;
    z-index: 90;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 16px;
    background: var(--bg);
  }
  #sub-screen.visible { display: flex; }
  #sub-screen h2 { font-size: 22px; font-weight: 800; margin-bottom: 4px; text-align: center; }
  #sub-screen p { font-size: 13px; color: var(--text-secondary); text-align: center; margin-bottom: 8px; }

  .tense-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 360px;
  }
  .tense-btn {
    background: #1a1a1a;
    border: 2px solid #2a2a2a;
    color: var(--text-primary);
    border-radius: 14px;
    padding: 16px 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    transition: all .2s;
    line-height: 1.3;
  }
  .tense-btn:hover, .tense-btn:active {
    border-color: var(--orange);
    background: rgba(251,146,60,.1);
    color: var(--orange);
    transform: scale(.98);
  }
  .tense-btn .tense-es { font-size: 11px; color: var(--text-secondary); font-weight: 500; display: block; margin-top: 2px; }

  /* Challenge config */
  .challenge-config {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .challenge-stat {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #1a1a1a;
    border-radius: 14px;
    padding: 14px 16px;
    border: 1px solid #2a2a2a;
  }
  .challenge-stat .label { font-size: 13px; color: var(--text-secondary); }
  .challenge-stat .value { font-size: 16px; font-weight: 700; color: var(--yellow); }

  .count-selector {
    background: #1a1a1a;
    border-radius: 14px;
    padding: 16px;
    border: 1px solid #2a2a2a;
  }
  .count-selector label { font-size: 13px; color: var(--text-secondary); display: block; margin-bottom: 12px; }
  .count-display { font-size: 28px; font-weight: 800; color: var(--yellow); text-align: center; margin-bottom: 10px; }
  .count-display span { font-size: 14px; color: var(--text-secondary); font-weight: 500; }
  .count-slider {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 4px;
    background: #333;
    outline: none;
  }
  .count-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--yellow);
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(251,191,36,.4);
  }
  .count-steps {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 11px;
    color: var(--text-secondary);
  }

  .start-btn {
    width: 100%;
    max-width: 360px;
    padding: 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: 0.3px;
  }
  .start-btn:active { transform: scale(.97); }
  .start-btn.verb-start { background: var(--orange); }
  .start-btn.challenge-start { background: var(--yellow); color: #000; }

  /* ── Bottom bar ── */
  #bottombar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    padding: 14px;
    padding-bottom: max(14px, env(safe-area-inset-bottom));
    background: linear-gradient(to top, #0f0f0fdd 70%, transparent);
    display: flex;
    justify-content: center;
    gap: 16px;
  }

  .action-btn {
    width: 54px; height: 54px;
    border-radius: 50%;
    border: 2px solid;
    background: transparent;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
    backdrop-filter: blur(8px);
  }
  .action-btn:active { transform: scale(.9); }
  .action-btn:disabled { opacity: 0.35; cursor: default; }

  .btn-bookmark { border-color: var(--yellow); color: var(--yellow); background: rgba(251,191,36,.1); }
  .btn-bookmark.active { background: var(--yellow); color: #000; }

  .btn-flip { width: 64px; height: 64px; border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,.15); font-size: 26px; }
  .btn-flip.verb { border-color: var(--orange); color: var(--orange); background: rgba(251,146,60,.15); }
  .btn-flip.conv { border-color: var(--cyan); color: var(--cyan); background: rgba(77,217,224,.15); }
  .btn-flip.challenge { border-color: var(--yellow); color: var(--yellow); background: rgba(251,191,36,.15); }

  .btn-sound { border-color: var(--cyan); color: var(--cyan); background: rgba(77,217,224,.1); }

  /* ── Empty state ── */
  #empty-state {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    text-align: center;
    padding: 40px;
    color: var(--text-secondary);
  }
  #empty-state.visible { display: flex; }
  #empty-state .emoji { font-size: 60px; margin-bottom: 8px; }
  #empty-state h2 { color: var(--text-primary); font-size: 22px; }
  #empty-state p { font-size: 14px; line-height: 1.6; }
  #empty-state button {
    margin-top: 16px;
    padding: 12px 28px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2a2a2a;
    color: var(--text-primary);
    padding: 10px 20px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    pointer-events: none;
    opacity: 0;
    transition: all .3s;
    white-space: nowrap;
    z-index: 200;
    border: 1px solid #3a3a3a;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Swipe hints ── */
  .swipe-hints {
    position: fixed;
    bottom: 90px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 24px;
    pointer-events: none;
    opacity: var(--swipe-hint-opacity);
    transition: opacity 1s;
    z-index: 50;
  }
  .swipe-hint-left { color: var(--red); font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 4px; }
  .swipe-hint-right { color: var(--green); font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 4px; }

  /* ── Loading ── */
  #loading {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    gap: 16px;
  }
  #loading .title { font-size: 28px; font-weight: 900; }
  #loading .title span { color: var(--accent); }
  #loading .subtitle { color: var(--text-secondary); font-size: 14px; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #2a2a2a;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Progress bar */
  #progress-bar-wrap { position: fixed; top: 0; left: 0; right: 0; height: 2px; z-index: 200; }
  #progress-bar { height: 100%; background: var(--accent); transition: width .3s, background .3s; border-radius: 0 2px 2px 0; }

  /* Challenge badge */
  .challenge-badge {
    position: absolute;
    top: 14px;
    right: 14px;
    background: rgba(251,191,36,.15);
    border: 1px solid rgba(251,191,36,.3);
    color: var(--yellow);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
  }

  /* Verb infinitive on back */
  .verb-infinitive {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 10px;
    font-style: italic;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="title">Vocab<span>Scroll</span></div>
  <div class="subtitle">DE → ES wird geladen…</div>
  <div class="spinner"></div>
</div>

<div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>

<div id="topbar">
  <div class="logo">Vocab<span>Scroll</span></div>
  <div class="mode-tabs">
    <button id="btn-mode-learn" class="active" onclick="setMode('learn')">Lernen</button>
    <button id="btn-mode-repeat" onclick="setMode('repeat')">Wieder.</button>
    <button id="btn-mode-verb" onclick="setMode('verb')">Verben</button>
    <button id="btn-mode-conv" onclick="setMode('conv')">Sätze</button>
    <button id="btn-mode-challenge" onclick="setMode('challenge')">Challenge</button>
  </div>
  <div id="progress-wrap">0/0</div>
</div>

<!-- Sub-screen for verb tense selection and challenge config -->
<div id="sub-screen">
  <!-- Content injected by JS -->
</div>

<div id="card-viewport">
  <div id="empty-state">
    <div class="emoji">📭</div>
    <h2>Keine Karten</h2>
    <p>Wische Karten nach links, um sie hier<br>zur Wiederholung zu speichern.</p>
    <button onclick="setMode('learn')">Zum Lernen</button>
  </div>
</div>

<div class="swipe-hints">
  <div class="swipe-hint-left">← Speichern</div>
  <div class="swipe-hint-right">Weiter →</div>
</div>

<div id="bottombar">
  <button class="action-btn btn-bookmark" id="btn-bookmark" onclick="toggleBookmark()" title="Zur Wiederholung">★</button>
  <button class="action-btn btn-flip" id="btn-flip" onclick="flipCard()" title="Karte umdrehen">↻</button>
  <button class="action-btn btn-sound" id="btn-sound" onclick="speakCurrent()" title="Aussprechen">♪</button>
</div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let allWords = [];          // learn mode
let allConversations = [];  // conv mode
let verbData = {};          // verb data by tense key
let meta = {};

let deck = [];
let deckIndex = 0;
let mode = 'learn';         // 'learn'|'repeat'|'verb'|'conv'|'challenge'
let verbTense = null;       // current verb tense ('present','preterite',...)
let repeatSet = new Set();       // for learn/conv
let verbRepeatSet = new Set();   // for verb mode
let cardFlipped = false;
let challengeCount = 20;    // daily challenge word count

const TENSES = [
  { key: 'present',     de: 'Präsens',              es: 'Presente',              file: 'verbs_present.json' },
  { key: 'preterite',   de: 'Präteritum (Indefinido)', es: 'Pretérito Indefinido', file: 'verbs_preterite.json' },
  { key: 'imperfect',   de: 'Imperfekt',             es: 'Imperfecto',            file: 'verbs_imperfect.json' },
  { key: 'future',      de: 'Futur',                 es: 'Futuro',                file: 'verbs_future.json' },
  { key: 'conditional', de: 'Konditional',           es: 'Condicional',           file: 'verbs_conditional.json' },
  { key: 'perfect',     de: 'Perfekt',               es: 'Pretérito Perfecto',    file: 'verbs_perfect.json' },
];

const viewport = document.getElementById('card-viewport');
const emptyState = document.getElementById('empty-state');
const progressWrap = document.getElementById('progress-wrap');
const progressBar = document.getElementById('progress-bar');
const btnBookmark = document.getElementById('btn-bookmark');
const btnFlip = document.getElementById('btn-flip');
const btnSound = document.getElementById('btn-sound');
const subScreen = document.getElementById('sub-screen');
const loading = document.getElementById('loading');

// ─────────────────────────────────────────────
// LOAD ALL DATA
// ─────────────────────────────────────────────
async function tryFetch(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function loadVocab() {
  // Load main vocab
  const vocabData = await tryFetch('vocab_de_es.json');
  if (vocabData) {
    meta = vocabData.meta || {};
    allWords = (vocabData.words || []).map(w => ({
      id: w.id, source: w.de || w.source || '', target: w.es || w.target || '', type: w.type || '', _src: 'vocab'
    }));
  } else {
    meta = { source_language_name: 'Deutsch', target_language_name: 'Español' };
    allWords = getDemoWords();
  }

  // Load conversations
  const convData = await tryFetch('conversations.json');
  if (convData) {
    allConversations = (convData.sentences || []).map(s => ({
      id: 'c' + s.id, source: s.de, target: s.es, type: s.cat || 'Konversation', _src: 'conv'
    }));
  } else {
    allConversations = getDemoConversations();
  }

  // Load all verb tenses
  for (const t of TENSES) {
    const d = await tryFetch(t.file);
    if (d) {
      verbData[t.key] = (d.verbs || []).map(v => ({
        id: 'v_' + t.key + '_' + v.id,
        source: v.de,
        target: v.es_infinitive,
        forms: v.forms,
        type: t.de,
        tenseKey: t.key,
        _src: 'verb'
      }));
    }
  }

  loadRepeatSets();
  loadChallengePrefs();
  startDeck();
  loading.style.display = 'none';
  showSwipeHints();
}

function getDemoWords() {
  return [
    {id:1,source:'ich',target:'yo',type:'pron',_src:'vocab'},

// ─────────────────────────────────────────────
// DAILY CHALLENGE LOGIC
// ─────────────────────────────────────────────
function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

function buildChallengePool() {
  const pool = [];
  // Add vocab words
  allWords.forEach(w => pool.push({ ...w, _challengeSrc: 'vocab' }));
  // Add conversations
  allConversations.forEach(w => pool.push({ ...w, _challengeSrc: 'conv' }));
  // Add verb words from all loaded tenses
  Object.values(verbData).forEach(verbs => {
    verbs.forEach(v => pool.push({ ...v, _challengeSrc: 'verb' }));
  });
  return pool;
}

function getDailyChallengeDeck(count) {
  const today = getTodayStr();
  const cacheKey = 'vocabscroll_challenge_' + today + '_' + count;
  try {
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      const ids = JSON.parse(cached);
      const pool = buildChallengePool();
      const byId = {};
      pool.forEach(w => byId[w.id] = w);
      const found = ids.map(id => byId[id]).filter(Boolean);
      if (found.length === count) return found;
    }
  } catch {}

  // Generate from seed
  const pool = buildChallengePool();
  const dateHash = today.split('').reduce((a, c) => ((a << 5) - a + c.charCodeAt(0)) | 0, 0);
  const seed = Math.abs(dateHash) + count * 31337;
  const rand = seededRandom(seed);

  // Fisher-Yates sample
  const arr = [...pool];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  const chosen = arr.slice(0, Math.min(count, arr.length));

  try {
    localStorage.setItem(cacheKey, JSON.stringify(chosen.map(w => w.id)));
  } catch {}
  return chosen;
}

// ─────────────────────────────────────────────
// DECK
// ─────────────────────────────────────────────
function buildDeck() {
  if (mode === 'learn') return [...allWords];
  if (mode === 'repeat') return allWords.filter(w => repeatSet.has(w.id));
  if (mode === 'conv') return [...allConversations];
  if (mode === 'verb' && verbTense) {
    const verbs = verbData[verbTense] || [];
    return [...verbs];
  }
  if (mode === 'challenge') return getDailyChallengeDeck(challengeCount);
  return [];
}

function startDeck() {
  deck = buildDeck();
  deckIndex = Math.min(loadDeckIndex(), Math.max(0, deck.length - 1));
  cardFlipped = false;
  renderCards();
  updateProgress();
  updateFlipBtn();
  updateProgressBarColor();
}

function nextCard() {
  cardFlipped = false;
  if (deckIndex < deck.length - 1) {
    deckIndex++;
    saveDeckIndex();
    renderCards();
    updateProgress();
  } else {
    showToast('🎉 Alle Karten geschafft!');
  }
}

function prevCard() {
  if (deckIndex > 0) {
    deckIndex--;
    cardFlipped = false;
    saveDeckIndex();
    renderCards();
    updateProgress();
  }
}

function updateProgress() {
  const total = deck.length;
  const cur = total === 0 ? 0 : deckIndex + 1;
  progressWrap.textContent = `${cur}/${total}`;
  const pct = total === 0 ? 0 : (deckIndex / Math.max(total - 1, 1)) * 100;
  progressBar.style.width = pct + '%';
}

function updateProgressBarColor() {
  const colors = { learn: '#6c63ff', repeat: '#6c63ff', verb: '#fb923c', conv: '#4dd9e0', challenge: '#fbbf24' };
  progressBar.style.background = colors[mode] || '#6c63ff';
}

function updateFlipBtn() {
  const el = document.getElementById('btn-flip');
  el.className = 'action-btn btn-flip';
  if (mode === 'verb') el.classList.add('verb');
  else if (mode === 'conv') el.classList.add('conv');
  else if (mode === 'challenge') el.classList.add('challenge');
}

// RENDER CARDS
// ─────────────────────────────────────────────
function renderCards() {
  viewport.querySelectorAll('.card').forEach(c => c.remove());
  emptyState.classList.remove('visible');

  if (deck.length === 0) {
    emptyState.classList.add('visible');
    const msg = mode === 'repeat'
      ? 'Wische Karten nach links zum Speichern.'
      : mode === 'challenge'
        ? 'Der Tages-Pool konnte nicht geladen werden.'
        : 'Keine Karten verfügbar.';
    emptyState.querySelector('p').innerHTML = msg;
    btnBookmark.disabled = true;
    btnFlip.disabled = true;
    btnSound.disabled = true;
    return;
  }

  btnBookmark.disabled = false;
  btnFlip.disabled = false;
  btnSound.disabled = false;

  for (let offset = 2; offset >= 0; offset--) {
    const idx = deckIndex + offset;
    if (idx >= deck.length) continue;
    const word = deck[idx];
    const el = createCardEl(word, offset === 0);
    if (offset === 0) el.classList.add('active');
    else if (offset === 1) el.classList.add('behind-1');
    else el.classList.add('behind-2');
    viewport.appendChild(el);
  }
  updateBookmarkBtn();
}

function getActiveRepeatSet() {
  return (mode === 'verb') ? verbRepeatSet : repeatSet;
}

function createCardEl(word, interactive) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.id = word.id;

  const isVerb = word._src === 'verb';
  const isConv = word._src === 'conv';
  const isChallenge = mode === 'challenge';
  const tenseInfo = isVerb ? TENSES.find(t => t.key === word.tenseKey) : null;

  // Type badge style
  let typeClass = '';
  if (isVerb) typeClass = 'verb';
  else if (isConv) typeClass = 'conv';
  else if (isChallenge) typeClass = 'challenge';

  // Back content
  let backContent = '';
  if (isVerb && word.forms) {
    const pronOrder = ['ich','du','er/sie','wir','ihr','sie'];
    const rows = pronOrder.map(p => {
      const f = word.forms[p] || '';
      return `<tr><td>${p}</td><td>${escHtml(f)}</td></tr>`;
    }).join('');
    backContent = `
      <div class="card-tag">${tenseInfo ? tenseInfo.es : 'Español'}</div>
      <div class="verb-infinitive">${escHtml(word.target)}</div>
      <table class="verb-table">${rows}</table>
      <button class="tts-btn verb" onclick="speakVerbForms(${JSON.stringify(word.forms).replace(/"/g,'&quot;')})">🔊 Alle Formen</button>
    `;
  } else {
    const targetText = escHtml(word.target);
    const ttsClass = isVerb ? 'verb' : isConv ? 'conv' : (isChallenge ? 'challenge' : '');
    backContent = `
      <div class="card-tag">${meta.target_language_name || 'Español'}</div>
      <div class="card-translation ${typeClass}">${targetText}</div>
      <button class="tts-btn ${ttsClass}" onclick="speakWord('${escAttr(word.target)}')">🔊 Aussprechen</button>
    `;
  }

  const frontExtraTag = isVerb ? `<div class="card-type verb">${escHtml(word.type)}</div>` :
                        isConv ? (word.type ? `<div class="card-type conv">${escHtml(word.type)}</div>` : '') :
                        isChallenge ? `<div class="card-type challenge">🔥 Challenge</div>` :
                        (word.type ? `<div class="card-type">${escHtml(word.type)}</div>` : '');

  const frontHint = isVerb ? 'Tippen für Konjugation' : 'Scrollen zum Umdrehen';
  const backHint = isVerb ? 'Wische für nächste Karte' : 'Wische für nächste Karte';
  const backClass = isVerb ? 'verb-back' : isConv ? 'conv-back' : '';

  card.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-front">
        <div class="swipe-left-overlay">← SPEICHERN</div>
        <div class="swipe-right-overlay">WEITER →</div>
        ${isChallenge ? `<div class="challenge-badge">🔥 Tag ${new Date().getDate()}</div>` : ''}
        <div class="card-tag">${meta.source_language_name || 'Deutsch'}</div>
        <div class="card-word">${escHtml(word.source)}</div>
        ${frontExtraTag}
        <div class="card-hint"><span class="dot"></span> ${frontHint} <span class="dot"></span></div>
      </div>
      <div class="card-face card-back ${backClass}">
        ${backContent}
        <div class="card-hint"><span class="dot"></span> ${backHint} <span class="dot"></span></div>
      </div>
    </div>
  `;

  if (interactive) addSwipeListeners(card, word);
  return card;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/'/g,"&#39;").replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────
// SWIPE / DRAG
// ─────────────────────────────────────────────
function addSwipeListeners(card, word) {
  let startX = 0, startY = 0, dragging = false, moved = false, startTime = 0;
  const leftOverlay = card.querySelector('.swipe-left-overlay');
  const rightOverlay = card.querySelector('.swipe-right-overlay');
  const inner = card.querySelector('.card-inner');

  function onStart(x, y) {
    startX = x; startY = y; dragging = true; moved = false; startTime = Date.now();
    inner.style.transition = 'none';
  }
  function onMove(x, y) {
    if (!dragging) return;
    const dx = x - startX, dy = y - startY;
    if (!moved && Math.abs(dx) < 5 && Math.abs(dy) < 5) return;
    moved = true;
    if (Math.abs(dx) > Math.abs(dy) * 0.7) {
      card.style.transform = `translateX(${dx}px) rotate(${dx * 0.06}deg)`;
      const ratio = Math.min(Math.abs(dx) / 120, 1);
      leftOverlay.style.opacity = dx < 0 ? ratio : 0;
      rightOverlay.style.opacity = dx > 0 ? ratio : 0;
    } else {
      card.style.transform = '';
    }
  }
  function onEnd(x, y) {
    if (!dragging) return;
    dragging = false;
    const dx = x - startX, dy = y - startY;
    const dt = Date.now() - startTime;
    const velX = Math.abs(dx) / dt, velY = dy / dt;
    inner.style.transition = '';
    card.style.transition = 'transform 0.3s cubic-bezier(.4,0,.2,1)';
    leftOverlay.style.opacity = 0; rightOverlay.style.opacity = 0;

    if (!moved) { flipCard(); card.style.transform = ''; return; }
    if (Math.abs(dy) > Math.abs(dx) && dy > 60 && velY > 0.3) { card.style.transform = ''; flipCard(); return; }

    const thr = 80, vthr = 0.5;
    if (dx < -thr || (dx < -30 && velX > vthr)) swipeOut(card, 'left', word);
    else if (dx > thr || (dx > 30 && velX > vthr)) swipeOut(card, 'right', word);
    else card.style.transform = '';
  }

  card.addEventListener('touchstart', e => { const t = e.touches[0]; onStart(t.clientX, t.clientY); }, {passive:true});
  card.addEventListener('touchmove', e => {
    const t = e.touches[0]; onMove(t.clientX, t.clientY);
    if (Math.abs(t.clientX - startX) > Math.abs(t.clientY - startY)) e.preventDefault();
  }, {passive:false});
  card.addEventListener('touchend', e => { const t = e.changedTouches[0]; onEnd(t.clientX, t.clientY); });
  card.addEventListener('mousedown', e => {
    onStart(e.clientX, e.clientY);
    const mm = ev => onMove(ev.clientX, ev.clientY);
    const mu = ev => { onEnd(ev.clientX, ev.clientY); window.removeEventListener('mousemove', mm); window.removeEventListener('mouseup', mu); };
    window.addEventListener('mousemove', mm);
    window.addEventListener('mouseup', mu);
  });
  card.addEventListener('wheel', e => {
    e.preventDefault();
    if (e.deltaY > 30) flipCard();
  }, {passive:false});
}

function swipeOut(card, direction, word) {
  const outX = direction === 'left' ? '-130vw' : '130vw';
  card.style.transition = 'transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.35s';
  card.style.transform = `translateX(${outX}) rotate(${direction === 'left' ? -20 : 20}deg)`;
  card.style.opacity = '0';

  const rs = getActiveRepeatSet();
  if (direction === 'left') {
    if (!rs.has(word.id)) {
      rs.add(word.id);
      saveRepeatSets();
      showToast('⭐ Zur Wiederholung gespeichert');
    }
  } else {
    if (mode === 'repeat') {
      rs.delete(word.id);
      saveRepeatSets();
      showToast('✓ Aus Wiederholung entfernt');
    }
  }
  setTimeout(nextCard, 300);
}

// ─────────────────────────────────────────────
// FLIP
// ─────────────────────────────────────────────
function flipCard() {
  const activeCard = viewport.querySelector('.card.active');
  if (!activeCard) return;
  cardFlipped = !cardFlipped;
  activeCard.classList.toggle('flipped', cardFlipped);
  if (cardFlipped) {
    const word = deck[deckIndex];
    if (word) {
      if (word._src === 'verb' && word.forms) {
        // Speak first form
        const f = word.forms['ich'];
        if (f) autoSpeak(f);
      } else {
        autoSpeak(word.target);
      }
    }
  }
}

// ─────────────────────────────────────────────
// BOOKMARK
// ─────────────────────────────────────────────
function toggleBookmark() {
  if (!deck[deckIndex]) return;
  const id = deck[deckIndex].id;
  const rs = getActiveRepeatSet();
  if (rs.has(id)) {
    rs.delete(id);
    showToast('Aus Wiederholung entfernt');
  } else {
    rs.add(id);
    showToast('⭐ Zur Wiederholung gespeichert');
  }
  saveRepeatSets();
  updateBookmarkBtn();
}

function updateBookmarkBtn() {
  if (!deck[deckIndex]) return;
  const rs = getActiveRepeatSet();
  btnBookmark.classList.toggle('active', rs.has(deck[deckIndex].id));
}

// ─────────────────────────────────────────────
// TTS
// ─────────────────────────────────────────────
let autoSpeakEnabled = true;

function speakWord(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'es-ES';
  utt.rate = 0.85;
  speechSynthesis.speak(utt);
}

function speakVerbForms(forms) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const pronOrder = ['ich','du','er/sie','wir','ihr','sie'];
  const texts = pronOrder.map(p => forms[p]).filter(Boolean);
  let i = 0;
  function speakNext() {
    if (i >= texts.length) return;
    const utt = new SpeechSynthesisUtterance(texts[i++]);
    utt.lang = 'es-ES';
    utt.rate = 0.8;
    utt.onend = speakNext;
    speechSynthesis.speak(utt);
  }
  speakNext();
}

function autoSpeak(text) {
  if (autoSpeakEnabled) speakWord(text);
}

function speakCurrent() {
  if (!deck[deckIndex]) return;
  const word = deck[deckIndex];
  if (!cardFlipped) {
    flipCard();
  } else {
    if (word._src === 'verb' && word.forms) {
      speakVerbForms(word.forms);
    } else {
      speakWord(word.target);
    }
  }
}

  setTimeout(() => {

    localStorage.setItem('vocabscroll_hints', '1');

}

// TOAST
// ─────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ─────────────────────────────────────────────
// KEYBOARD
// ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (subScreen.classList.contains('visible')) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextCard(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prevCard(); }
  else if (e.key === 'ArrowDown' || e.key === 'f') { e.preventDefault(); flipCard(); }
  else if (e.key === 's') { e.preventDefault(); speakCurrent(); }
  else if (e.key === 'b') { e.preventDefault(); toggleBookmark(); }
  else if (e.key === '1') setMode('learn');
  else if (e.key === '2') setMode('repeat');
  else if (e.key === '3') setMode('verb');
  else if (e.key === '4') setMode('conv');
  else if (e.key === '5') setMode('challenge');
});
